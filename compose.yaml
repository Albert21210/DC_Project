services:
  web:
    build: .
    image: pixel-shop:latest
    ports:
      - "8000:8000"
    environment:
      - SHOP_DB_PATH=/data/shop.db
    volumes:
      - shop_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  shop_data:
    driver: local
