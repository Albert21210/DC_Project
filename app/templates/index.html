<!DOCTYPE html>
<html lang="ru">
<head>

<body>
<div class="app-shell">

    <!-- ── HEADER ── -->
  <header class="header">
    <button class="header__burger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
    <span class="header__logo">🖥️ Pixel</span>
    <span class="header__sub">Компьютерный магазин</span>
  </header>

  <nav class="sidebar">

    <div class="sidebar__section">Обзор</div>

    <div class="sidebar__section">Каталог</div>

    <div class="sidebar__section">Продажи</div>
    <div class="sidebar__item" data-page="orders">🛒 Заказы</div>

    <div class="sidebar__section">Клиенты и штат</div>
    <div class="sidebar__item" data-page="customers">👥 Клиенты</div>
    <div class="sidebar__item" data-page="employees">👔 Сотрудники</div>
    <div class="sidebar__item" data-page="suppliers">🏭 Поставщики</div>
  </nav>
